<title>Кабельный журнал CAD — стабильная версия</title>
<style>
:root{--bg:#eef3f8;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#cbd5e1;--blue:#2563eb;--orange:#f97316;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:ISOCPEUR,Arial,sans-serif;font-size:12pt;font-style:italic}
button,input,select{font:inherit;font-size:12px}
button{border:1px solid var(--border);background:#fff;border-radius:9px;padding:7px 10px;cursor:pointer}

label{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}
.app{height:100%;display:grid;grid-template-columns:300px 1fr 390px;grid-template-rows:52px 1fr 230px}
.app.schemeWide{grid-template-columns:1fr;grid-template-rows:52px 1fr 92px}

.top{grid-column:1/4;background:#111827;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 12px}
.top button{background:#1f2937;color:#fff;border-color:#334155}.actions{display:flex;gap:7px;align-items:center}.brand{font-weight:800}
.left{grid-row:2/4;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column}
.right{grid-row:2/4;background:#fff;border-left:1px solid var(--border);overflow:auto;padding:12px}
.center{position:relative;overflow:hidden;background:#f8fafc}.bottom{grid-column:2/3;background:#fff;border-top:1px solid var(--border);overflow:auto}
.panelHead{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}.panelTitle{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:800;letter-spacing:.08em}

.toolbar{position:absolute;z-index:50;left:12px;top:12px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;background:#ffffffdd;border:1px solid var(--border);border-radius:14px;padding:8px;box-shadow:0 8px 24px #0002}

#wires{position:absolute;inset:0;width:3600px;height:2400px;z-index:3;pointer-events:none}
.sheet{position:absolute;left:0;top:0;border:2px solid #111827;background:transparent;z-index:0}.titleBlock{position:absolute;right:0;bottom:0;width:520px;height:145px;background:#fff;border-left:2px solid #111827;border-top:2px solid #111827;display:grid;grid-template-columns:80px 1fr 100px;grid-template-rows:32px 32px 32px 49px;font-size:11pt}.titleBlock div{border-right:1px solid #111827;border-bottom:1px solid #111827;padding:5px}.titleBlock .editable{cursor:pointer}.titleBlock .editable:hover{background:#dbeafe}.titleBlock .big{font-weight:800;font-size:13pt}
.room{position:absolute;z-index:1;background:rgba(226,232,240,.26);border:2px solid #64748b;border-radius:4px}.room.selected{border-color:var(--blue);box-shadow:0 0 0 3px #2563eb33}.roomLabel{position:absolute;left:8px;top:6px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:4px 7px;font-weight:800;font-size:12px;cursor:move}.dimH,.dimV{position:absolute;background:#fff;border:1px solid var(--border);border-radius:999px;padding:2px 6px;font-size:11px}.dimH{left:50%;bottom:-22px;transform:translateX(-50%)}.dimV{right:-32px;top:50%;transform:translateY(-50%) rotate(90deg)}

}
.portDot.in{border-color:#0ea5e9}.portDot.out{border-color:#f97316}.portDot.used.in{background:#0ea5e9}.portDot.used.out{background:#f97316}

.portDot:hover::after{content:attr(data-tip);position:absolute;left:14px;top:-8px;white-space:nowrap;background:#0f172a;color:#fff;border-radius:8px;padding:5px 7px;font-size:11px;z-index:80}
.handle{position:absolute;width:14px;height:14px;right:-7px;bottom:-7px;border-radius:4px;background:var(--blue);border:2px solid #fff;box-shadow:0 3px 8px #0003;cursor:nwse-resize;z-index:20;display:none}
.delete{position:absolute;width:20px;height:20px;right:-10px;top:-10px;border-radius:50%;background:var(--red);color:#fff;border:2px solid #fff;box-shadow:0 3px 8px #0003;cursor:pointer;z-index:21;text-align:center;line-height:16px;font-weight:900;display:none}
.selected .handle,.selected .delete{display:block}

.field{margin-bottom:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.card{border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px;background:#fff}.hint{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:9px;font-size:12px;color:#475569;margin:8px 0;line-height:1.4}.badge{display:inline-flex;border-radius:999px;background:#f1f5f9;padding:3px 7px;font-size:11px;margin:2px;color:#334155}
.cableGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cableRouteGrid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}.portEditHead,.portEditRow{display:grid;grid-template-columns:42px 72px 1.1fr 80px 110px 1fr 34px;gap:5px;align-items:center}.portEditHead{font-size:10px;font-weight:800;color:#64748b;margin:8px 0 4px}.portEditRow{margin-bottom:5px}.portEditRow input,.portEditRow select{font-size:11px;padding:5px}.portEditRow .busy{background:#f0fdf4;border-color:#22c55e}
.contextMenu{position:fixed;display:none;z-index:200;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px #0002;padding:6px;min-width:190px}.contextMenu button{display:block;width:100%;text-align:left;border:0;background:#fff;border-radius:8px}.contextMenu button:hover{background:#eff6ff}
.modalBackdrop{position:fixed;inset:0;background:#0008;display:none;z-index:300;align-items:center;justify-content:center}.modal{width:min(900px,92vw);max-height:86vh;overflow:hidden;background:#fff;border-radius:16px;display:flex;flex-direction:column}.modalHead{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.modalBody{padding:12px;overflow:auto}.presetGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.bigPreset{border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff;cursor:pointer}.bigPreset:hover{border-color:var(--blue);background:#eff6ff}
.command{position:absolute;left:12px;bottom:12px;z-index:60;background:#0f172ae6;color:#fff;border-radius:12px;padding:8px 10px;display:flex;gap:8px;align-items:center;min-width:520px}.command input{background:#111827;color:#fff;border-color:#334155;height:30px}
@media print{.top,.left,.right,.bottom,.toolbar,.layers,.command,.contextMenu{display:none!important}.app{display:block;height:auto}.center{width:100vw;height:100vh}.stageOuter{position:absolute!important;inset:0!important;overflow:hidden}.stage{background:#fff!important}.device,.room{box-shadow:none!important}}

<body>
<div class="app schemeWide">
<header class="top"><div class="brand">Кабельный журнал CAD <span style="color:#cbd5e1;font-weight:400">стабильная версия</span></div><div class="actions"><span id="status" style="font-size:12px;color:#cbd5e1">Готово</span><button onclick="openAddBlock()">+ Блок</button><button onclick="addRoom()">+ Помещение</button><button onclick="saveLocal()">Сохранить</button><button onclick="loadLocal()">Загрузить</button><button onclick="exportJSON()">JSON</button><button onclick="document.getElementById(\'jsonImport\').click()">Импорт JSON</button><input id="jsonImport" type="file" accept=".json,application/json" style="display:none" onchange="importJSONFile(event)"><button onclick="exportXLS()" class="primary">Excel</button><button onclick="exportPDF()">PDF схемы</button><button onclick="selfCheck()">Проверка</button><button onclick="loadDemo()">Демо</button></div></header>
<aside class="left"><div class="panelHead"><div class="panelTitle">Библиотека блоков</div><button onclick="openAddBlock()">Добавить</button></div><div class="libraryTools"><input id="search" placeholder="Поиск блока..." oninput="renderLibrary()"><select id="cat" onchange="renderLibrary()"><option value="">Все категории</option><option>Сеть</option><option>Серверы</option><option>Видео</option><option>Управление</option><option>Аудио</option><option>Инфраструктура</option></select></div><div id="library" class="library"></div></aside>
<main class="center">
<div class="toolbar"><button id="tool_select" onclick="setTool('select')">Выбор</button><button id="tool_connect" onclick="setTool('connect')">Кабель</button><button id="tool_pan" onclick="setTool('pan')">Рука</button><button onclick="zoomBy(1.15)">+</button><button onclick="zoomBy(.87)">−</button><span id="zoomLabel" style="font-size:12px">100%</span><button onclick="fitView()">Вписать</button><button onclick="toggleWide()">Большая схема</button><button onclick="toggleInspector()">Инспектор</button><button onclick="duplicateSelected()">Дублировать</button><button class="danger" onclick="deleteSelected()">Удалить</button><select id="sheetFormat" style="width:75px" onchange="project.sheet=this.value;renderAll()"><option>A3</option><option>A2</option><option>A1</option></select><button onclick="openSheetEditor()">Штамп</button></div>
<div class="layers"><strong>Слои</strong><label><input type="checkbox" id="layerSheet" checked onchange="renderAll()"> Лист</label><label><input type="checkbox" id="layerRooms" checked onchange="renderAll()"> Помещения</label><label><input type="checkbox" id="layerCables" checked onchange="renderAll()"> Кабели</label><label><input type="checkbox" id="layerLabels" onchange="renderAll()"> Подписи</label><label><input type="checkbox" id="layerPorts" checked onchange="renderAll()"> Порты</label><label><input type="checkbox" id="layerDims" checked onchange="renderAll()"> Размеры</label></div>
<div class="stageOuter" id="stageOuter" ondragover="event.preventDefault()" ondrop="dropPreset(event)" oncontextmenu="openContextMenu(event)"><div class="stage" id="stage"><svg id="wires"></svg></div></div>
<div class="command"><span style="font-size:12px;color:#cbd5e1">Команда</span><input id="cmd" placeholder="block, room, cable, delete, fit, demo, pdf..." onkeydown="runCommand(event)"><button onclick="executeCommand()">Enter</button></div>
</main>
<aside class="right" id="rightPanel"><div style="display:flex;justify-content:space-between;align-items:center"><div class="panelTitle">Инспектор / свойства</div><button onclick="toggleInspector()" style="padding:4px 8px">×</button></div><div id="inspector" style="margin-top:10px"></div></aside>
<section class="bottom"><div class="tableHead"><strong>Кабельный журнал</strong><div><span class="badge" id="count">0 линий</span><button onclick="exportXLS()">Excel</button><button onclick="exportCSV()">CSV</button></div></div><div id="journal"></div></section>
</div>

<div class="contextMenu" id="contextMenu"><button onclick="openAddBlock();hideMenu()">Добавить блок</button><button onclick="addRoom();hideMenu()">Добавить помещение</button><button onclick="duplicateSelected();hideMenu()">Дублировать</button><button onclick="renameSelected();hideMenu()">Переименовать</button><button onclick="deleteSelected();hideMenu()">Удалить</button></div>

<div class="modalBackdrop" id="blockModal"><div class="modal"><div class="modalHead"><strong>Добавить блок</strong><button onclick="closeAddBlock()">Закрыть</button></div><div class="modalBody"><div class="grid2" style="margin-bottom:10px"><input id="modalSearch" placeholder="Поиск..." oninput="renderPresetModal()"><select id="modalCat" onchange="renderPresetModal()"><option value="">Все категории</option><option>Сеть</option><option>Серверы</option><option>Видео</option><option>Управление</option><option>Аудио</option><option>Инфраструктура</option></select></div><div class="presetGrid" id="presetGrid"></div></div></div></div>

<div class="modalBackdrop" id="sheetModal"><div class="modal"><div class="modalHead"><strong>Штамп листа</strong><button onclick="closeSheetEditor()">Закрыть</button></div><div class="modalBody"><div class="grid2"><div class="field"><label>Формат</label><select id="s_sheet" onchange="project.sheet=this.value;syncSheetEditor()"><option>A3</option><option>A2</option><option>A1</option></select></div><div class="field"><label>Лист №</label><input id="s_no" oninput="project.sheetNo=this.value;renderAll()"></div><div class="field"><label>Название</label><input id="s_title" oninput="project.sheetTitle=this.value;renderAll()"></div><div class="field"><label>Шифр</label><input id="s_code" oninput="project.sheetCode=this.value;renderAll()"></div><div class="field"><label>Раздел</label><input id="s_section" oninput="project.sheetSection=this.value;renderAll()"></div><div class="field"><label>Стадия</label><input id="s_stage" oninput="project.sheetStage=this.value;renderAll()"></div><div class="field"><label>Дата</label><input id="s_date" oninput="project.sheetDate=this.value;renderAll()"></div><div class="field"><label>Примечание</label><input id="s_note" oninput="project.sheetFontNote=this.value;renderAll()"></div></div></div></div></div>

<script>
const signalTypes=['LAN','WAN','HDBaseT','HDMI','DisplayPort','USB Control','KVM','Dante','Audio','Speaker','PoE','RS-232','IR','GPIO','Power','Reserve'];
function port(num,name,iface,signal,cable,dir='out'){return{num:String(num),name,interface:iface,signal,cable,direction:dir}}
const presets=[
 {cat:'Сеть',type:'router',icon:'🌐',title:'Маршрутизатор',model:'TP-Link ER8411',prefix:'ER',w:280,h:380,ports:[port(1,'WAN SFP','SFP','WAN','FO patch','in'),port(2,'LAN SFP+','SFP+','LAN','FO patch','out'),...Array.from({length:8},(_,i)=>port(i+3,'LAN RJ-45 '+(i+1),'RJ-45','LAN','UTP Cat.6','out'))]},
 {cat:'Сеть',type:'switch',icon:'🔀',title:'Коммутатор',model:'TP-Link SG3428XPP-M2',prefix:'SW',w:280,h:520,ports:[...Array.from({length:23},(_,i)=>port(i+1,'LAN RJ-45','RJ-45','LAN','UTP Cat.6','out')),port(24,'WAN RJ-45','RJ-45','WAN','UTP Cat.6','in'),port(28,'SFP+','SFP+','LAN','FO patch','in')]},
 {cat:'Инфраструктура',type:'patch',icon:'▦',title:'Патч-панель Cat.5e',model:'24 порта Cat.5e',prefix:'PP',w:300,h:560,ports:Array.from({length:24},(_,i)=>port(i+1,'RJ-45/Krone','RJ-45','LAN','UTP Cat.5e','in'))},
 {cat:'Инфраструктура',type:'patch',icon:'▦',title:'Патч-панель Cat.6a',model:'24 порта Cat.6a',prefix:'PP',w:300,h:560,ports:Array.from({length:24},(_,i)=>port(i+1,'RJ-45/Krone','RJ-45','HDBaseT','F/UTP Cat.6a','in'))},
 {cat:'Серверы',type:'server',icon:'🖥',title:'Медиасервер',model:'Visuals 5060 / MSI Cubi',prefix:'MSR',w:280,h:380,ports:[port(1,'LAN','RJ-45','LAN','UTP Cat.6','in'),port(2,'HDMI OUT','HDMI','HDMI','HDMI','out'),port(3,'DP OUT','DP','DisplayPort','DisplayPort','out'),port(4,'USB Control','USB-A','USB Control','USB','out')]},
 {cat:'Управление',type:'kvm',icon:'⌨',title:'KVM-адаптер',model:'ATEN KG8900T',prefix:'KVMA',w:280,h:360,ports:[port(1,'KVM RJ-45','RJ-45','KVM','UTP Cat.6','in'),port(2,'DP Video','DP','DisplayPort','DP','in'),port(3,'USB Control','USB-A','USB Control','USB','in')]},
 {cat:'Видео',type:'hdmi',icon:'▶',title:'HDMI-удлинитель TX',model:'AVCLINK HT-4K120TX',prefix:'VTX',w:280,h:320,ports:[port(1,'HDMI IN','HDMI','HDMI','HDMI','in'),port(2,'HDBT OUT','RJ-45','HDBaseT','F/UTP Cat.6a','out')]},
 {cat:'Видео',type:'hdmi',icon:'◀',title:'HDMI-удлинитель RX',model:'AVCLINK HT-4K120RX',prefix:'VRX',w:280,h:320,ports:[port(1,'HDBT IN','RJ-45','HDBaseT','F/UTP Cat.6a','in'),port(2,'HDMI OUT','HDMI','HDMI','HDMI','out')]},
 {cat:'Видео',type:'display',icon:'▣',title:'Экран / панель',model:'Samsung / Lumien',prefix:'TV',w:280,h:330,ports:[port(1,'HDMI IN','HDMI','HDMI','HDMI','in'),port(2,'LAN','RJ-45','LAN','UTP Cat.6','in'),port(3,'USB Control','USB-A','USB Control','USB','in')]},
 {cat:'Аудио',type:'amp',icon:'♫',title:'Усилитель мощности',model:'Audac EPA/SMQ',prefix:'AMP',w:280,h:360,ports:[port(1,'Dante/LAN','RJ-45','Dante','UTP Cat.6','in'),port(2,'Audio IN','RCA','Audio','Audio cable','in'),port(3,'Audio OUT 1','XLR','Speaker','Speaker cable','out'),port(4,'Audio OUT 2','XLR','Speaker','Speaker cable','out')]},
 {cat:'Аудио',type:'speaker',icon:'🔊',title:'Акустическая система',model:'Audac / Ecler',prefix:'SPK',w:260,h:240,ports:[port(1,'Audio IN','XLR/Phoenix','Speaker','Speaker cable','in')]}
];

const project={pxPerM:50,reservePct:10,sheet:'A3',sheetNo:'1',sheetTitle:'Функциональная схема',sheetCode:'КЖ-СХ',sheetSection:'Кабельная схема',sheetStage:'КЖ',sheetDate:new Date().toLocaleDateString('ru-RU'),sheetFontNote:'ISOCPEUR 12'};
let devices=[],rooms=[],cables=[],counters={},selected={type:null,id:null},pending=null,tool='select',zoom=.55,pan={x:20,y:20};
function uid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function attr(v){return esc(v).replace(/`/g,'&#96;')}
function setStatus(t){status.textContent=t}
function normalizeDevice(d){
 d.code=d.code||`${d.prefix||'BLK'}-1`;
 d.title=d.title||'Блок';
 d.model=d.model||'';
 d.unit=d.unit||'';
 d.room=d.room||'';
 d.rack=d.rack||'';
 d.networkName=d.networkName||'';
 d.specNo=d.specNo||'';
 d.icon=d.icon||'□';
 d.ports=(d.ports||[]).map(p=>({num:String(p.num??''),name:p.name||'',interface:p.interface||'',signal:p.signal||'LAN',cable:p.cable||'',direction:p.direction||'out'}));
 d.w=Math.min(Math.max(+d.w||280,260),320);
 const inCount=d.ports.filter(p=>p.direction==='in').length;
 const outCount=d.ports.filter(p=>p.direction!=='in').length;
 const maxSide=Math.max(1,inCount,outCount);
 const minH=d.type==='patch'
   ? Math.max(520, 160 + d.ports.length*22)
   : Math.max(320, 160 + maxSide*22);
 d.h=Math.max(+d.h||minH,minH);
}
function init(){
 renderLibrary();
 setTool('select');
 renderAll();
 setupPan();
 setTimeout(fitView,50);
}
function renderLibrary(){const q=(search.value||'').toLowerCase(),c=cat.value;library.innerHTML=presets.filter(p=>(!c||p.cat===c)&&(`${p.title} ${p.model}`.toLowerCase().includes(q))).map(p=>`<div class="preset" draggable="true" ondragstart="dragPreset(event,'${p.prefix}','${p.title}')" ondblclick="addPresetCenter('${p.prefix}','${p.title}')"><strong>${p.icon} ${esc(p.title)}</strong><span>${esc(p.model)}</span><br><span class="badge">${p.cat}</span><span class="badge">${p.ports.length} порт.</span></div>`).join('')}
function findPreset(prefix,title){return presets.find(p=>p.prefix===prefix&&p.title===title)||presets[0]}
function dragPreset(e,p,t){e.dataTransfer.setData('prefix',p);e.dataTransfer.setData('title',t)}
function world(e){const r=stageOuter.getBoundingClientRect();return{x:(e.clientX-r.left-pan.x)/zoom,y:(e.clientY-r.top-pan.y)/zoom}}
function snap(v){return Math.round(v/20)*20}
function dropPreset(e){const p=e.dataTransfer.getData('prefix'),t=e.dataTransfer.getData('title');if(!p)return;const pt=world(e);addDevice(findPreset(p,t),snap(pt.x),snap(pt.y))}
function addPresetCenter(p,t){const r=stageOuter.getBoundingClientRect();addDevice(findPreset(p,t),snap((r.width/2-pan.x)/zoom),snap((r.height/2-pan.y)/zoom))}
function nextCode(prefix){counters[prefix]=(counters[prefix]||0)+1;return prefix==='PP'?`PP.034/1/${counters[prefix]}`:`${prefix}-1-0-${counters[prefix]}`}
function nextNet(type){const m={router:'RTR',switch:'SW',patch:'PP',server:'MSR',kvm:'KVM',hdmi:'VTX',display:'DISP',amp:'AMP',speaker:'SPK'},p=m[type]||'DEV';counters['net_'+p]=(counters['net_'+p]||0)+1;return `${p}-${counters['net_'+p]}`}
function addDevice(p,x,y){const d=JSON.parse(JSON.stringify(p));d.id=uid();d.code=nextCode(d.prefix);d.x=x;d.y=y;d.networkName=nextNet(d.type);normalizeDevice(d);d.w=Math.min(Math.max(d.w||280,260),320);d.h=Math.max(d.h||320,190+Math.max(1,Math.max(d.ports.filter(p=>p.direction==='in').length,d.ports.filter(p=>p.direction!=='in').length))*22);devices.push(d);selected={type:'device',id:d.id};showInspector();renderAll()}
function openAddBlock(){blockModal.style.display='flex';renderPresetModal()}function closeAddBlock(){blockModal.style.display='none'}
function renderPresetModal(){const q=(modalSearch?.value||'').toLowerCase(),c=modalCat?.value||'';presetGrid.innerHTML=presets.filter(p=>(!c||p.cat===c)&&(`${p.title} ${p.model}`.toLowerCase().includes(q))).map(p=>`<div class="bigPreset" onclick="addPresetCenter('${p.prefix}','${p.title}');closeAddBlock()"><strong>${p.icon} ${esc(p.title)}</strong><p>${esc(p.model)}</p><span class="badge">${p.cat}</span><span class="badge">${p.ports.length} портов</span></div>`).join('')}
function setTool(t){tool=t;[tool_select,tool_connect,tool_pan].forEach(b=>b.style.background='');document.getElementById('tool_'+t).style.background='#dbeafe';pending=null;renderPorts()}
function zoomBy(k){zoom=Math.max(.2,Math.min(2.5,zoom*k));applyTransform()}function fitView(){
 const r=stageOuter.getBoundingClientRect();
 const s=sheetSize();
 const margin=36;
 const zx=(r.width-margin*2)/s.w;
 const zy=(r.height-margin*2)/s.h;
 zoom=Math.max(.18,Math.min(1.15,Math.min(zx,zy)));
 pan={x:margin,y:margin};
 applyTransform();
}
function applyTransform(){stage.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${zoom})`;zoomLabel.textContent=Math.round(zoom*100)+'%'}
function setupPan(){let down=false,sx=0,sy=0,op;stageOuter.addEventListener('mousedown',e=>{if(tool!=='pan'&&!e.altKey&&e.button!==1)return;if(e.target.closest('.device,.room,.portDot'))return;down=true;sx=e.clientX;sy=e.clientY;op={...pan};stageOuter.classList.add('panning')});window.addEventListener('mousemove',e=>{if(!down)return;pan.x=op.x+e.clientX-sx;pan.y=op.y+e.clientY-sy;applyTransform()});window.addEventListener('mouseup',()=>{down=false;stageOuter.classList.remove('panning')});stageOuter.addEventListener('wheel',e=>{if(!e.ctrlKey&&!e.metaKey)return;e.preventDefault();zoomBy(e.deltaY<0?1.1:.9)},{passive:false})}
function renderAll(){renderStage();renderInspector();renderJournal()}
function renderWithoutInspector(){renderStage();renderJournal()}
function renderStage(){stage.querySelectorAll('.sheet,.room,.device,.portDot').forEach(e=>e.remove());renderSheet();if(layerRooms.checked)rooms.forEach(r=>stage.appendChild(roomEl(r)));devices.forEach(d=>stage.appendChild(deviceEl(d)));renderWires();renderPorts()}
function sheetSize(){if(project.sheet==='A1')return{w:4200,h:2970};if(project.sheet==='A2')return{w:2970,h:2100};return{w:2100,h:1485}}
function renderSheet(){if(!layerSheet.checked)return;const s=sheetSize(),el=document.createElement('div');el.className='sheet';el.style.width=s.w+'px';el.style.height=s.h+'px';el.innerHTML=`<div class="titleBlock"><div>Изм.</div><div class="editable big" onclick="editProject('sheetTitle','Название')">${esc(project.sheetTitle)}</div><div class="editable" onclick="editProject('sheetNo','Лист')">Лист ${esc(project.sheetNo)}</div><div>Разраб.</div><div class="editable" onclick="editProject('sheetCode','Шифр')">${esc(project.sheetCode)}</div><div class="editable" onclick="editProject('sheet','Формат')">${esc(project.sheet)}</div><div>Пров.</div><div class="editable" onclick="editProject('sheetSection','Раздел')">${esc(project.sheetSection)}</div><div class="editable" onclick="editProject('sheetFontNote','Шрифт')">${esc(project.sheetFontNote)}</div><div>Дата</div><div class="editable" onclick="editProject('sheetDate','Дата')">${esc(project.sheetDate)}</div><div class="editable" onclick="editProject('sheetStage','Стадия')">${esc(project.sheetStage)}</div></div>`;stage.appendChild(el)}
function editProject(k,l){const v=prompt(l,project[k]||'');if(v!==null){project[k]=v;renderAll()}}
function addRoom(){const n=rooms.length+1;rooms.push({id:uid(),name:'Помещение '+n,roomNo:'0.4.'+(30+n),x:100+n*30,y:100+n*30,w:600,h:360,wM:12,hM:7});selected={type:'room',id:rooms.at(-1).id};renderAll()}
function roomEl(r){const el=document.createElement('div');el.className='room'+(selected.type==='room'&&selected.id===r.id?' selected':'');el.style.left=r.x+'px';el.style.top=r.y+'px';el.style.width=r.w+'px';el.style.height=r.h+'px';el.innerHTML=`<div class="roomLabel">${esc(r.roomNo)} — ${esc(r.name)}</div>${layerDims.checked?`<div class="dimH">${(r.w/project.pxPerM).toFixed(1)} м</div><div class="dimV">${(r.h/project.pxPerM).toFixed(1)} м</div>`:''}<div class="delete">×</div><div class="handle"></div>`;el.querySelector('.roomLabel').ondblclick=e=>{e.stopPropagation();const v=prompt('Название помещения',r.name);if(v!==null){r.name=v;renderAll()}};el.querySelector('.delete').onclick=e=>{e.stopPropagation();selected={type:'room',id:r.id};deleteSelected()};el.querySelector('.handle').onmousedown=e=>{e.stopPropagation();selected={type:'room',id:r.id};resizeObj(e,r,'room')};el.onmousedown=e=>{if(e.target.classList.contains('handle')||e.target.classList.contains('delete'))return;selected={type:'room',id:r.id};dragObj(e,r)};return el}
function deviceEl(d){
 normalizeDevice(d);
 const isPatch=d.type==='patch';
 const el=document.createElement('div');
 el.className=`device ${d.type}${selected.type==='device'&&selected.id===d.id?' selected':''}`;
 el.style.left=d.x+'px';
 el.style.top=d.y+'px';
 el.style.width=d.w+'px';
 el.style.height=d.h+'px';

 const inPorts=d.ports.map((p,i)=>({p,i})).filter(x=>x.p.direction==='in');
 const outPorts=d.ports.map((p,i)=>({p,i})).filter(x=>x.p.direction!=='in');
 const used=d.ports.filter((p,i)=>isPortUsed(d.id,i)).length;

 el.innerHTML=`
  <div class="devTag">Пом. ${esc(d.room||'—')} · ${esc(d.code)}</div>
  <div class="devHead">
    <div class="devIcon">${d.icon||'□'}</div>
    <div style="min-width:0;flex:1">
      <div class="devTitle">${esc(d.title)}</div>
      <div class="devModel">${esc(d.model)}</div>
    </div>
  </div>
  <div class="metaGrid">
    <div class="metaItem">Спец.: ${esc(d.specNo||'—')}</div>
    <div class="metaItem">Unit: ${esc(d.unit||'—')}</div>
    <div class="metaItem">Сеть: ${esc(d.networkName||'—')}</div>
    <div class="metaItem">Шкаф: ${esc(d.rack||'—')}</div>
    <div class="metaItem">Порты: ${used}/${d.ports.length}</div>
    <div class="metaItem">Помещение: ${esc(d.room||'—')}</div>
  </div>
  ${isPatch?patchHtml(d):ordinaryPortsHtml(inPorts,outPorts,d)}
  <div class="delete">×</div>
  <div class="handle"></div>`;

 el.querySelector('.devHead').onmousedown=e=>{e.stopPropagation();selected={type:'device',id:d.id};showInspector();dragObj(e,d)};
 el.querySelector('.delete').onclick=e=>{e.stopPropagation();selected={type:'device',id:d.id};deleteSelected()};
 el.querySelector('.handle').onmousedown=e=>{e.stopPropagation();selected={type:'device',id:d.id};resizeObj(e,d,'device')};
 el.ondblclick=e=>{e.stopPropagation();selected={type:'device',id:d.id};showInspector();renderAll();setTimeout(()=>document.querySelector('#inspector input')?.focus(),50)};
 el.onmousedown=e=>{if(e.target.closest('.delete,.handle'))return;selected={type:'device',id:d.id};showInspector();renderAll()};
 return el;
}
function patchHtml(d){
 return `<div class="portsWrapPatch">
   <div class="portsCol2"><div class="portsLabel2">Krone</div><div class="portsStack2">${d.ports.map((p,i)=>`<div class="portBox2 ${isPortUsed(d.id,i)?'used in':''}" title="Krone ${esc(p.num)}">${esc(p.num)}</div>`).join('')}</div></div>
   <div class="portsCol2"><div class="portsLabel2">RJ-45</div><div class="portsStack2">${d.ports.map((p,i)=>`<div class="portBox2 ${isPortUsed(d.id,i)?'used out':''}" title="RJ-45 ${esc(p.num)}">${esc(p.num)}</div>`).join('')}</div></div>
 </div>`;
}
function ordinaryPortsHtml(ins,outs,d){
 const left=ins.map(({p,i})=>`<div class="portBox2 ${isPortUsed(d.id,i)?'used in':''}" title="${esc(p.signal)} · ${esc(p.name)}">${esc(p.num)}</div>`).join('')||'<div class="portBox2">—</div>';
 const right=outs.map(({p,i})=>`<div class="portBox2 ${isPortUsed(d.id,i)?'used out':''}" title="${esc(p.signal)} · ${esc(p.name)}">${esc(p.num)}</div>`).join('')||'<div class="portBox2">—</div>';
 return `<div class="portsWrap2">
   <div class="portsCol2"><div class="portsLabel2">Вход</div><div class="portsStack2">${left}</div></div>
   <div class="portsFill2"></div>
   <div class="portsCol2"><div class="portsLabel2">Выход</div><div class="portsStack2">${right}</div></div>
 </div>`;
}
function dragObj(e,o){const sx=e.clientX,sy=e.clientY,ox=o.x,oy=o.y;function mv(a){o.x=snap(ox+(a.clientX-sx)/zoom);o.y=snap(oy+(a.clientY-sy)/zoom);renderStage();renderJournal()}function up(){window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);renderAll()}window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up)}
function resizeObj(e,o,type){const sx=e.clientX,sy=e.clientY,ow=o.w,oh=o.h;function mv(a){o.w=snap(Math.max(type==='room'?160:260,ow+(a.clientX-sx)/zoom));o.h=snap(Math.max(type==='room'?120:160,oh+(a.clientY-sy)/zoom));if(type==='room'){o.wM=+(o.w/project.pxPerM).toFixed(1);o.hM=+(o.h/project.pxPerM).toFixed(1)}renderStage();renderJournal()}function up(){window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);renderAll()}window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up)}
function portCenter(did,pi){
